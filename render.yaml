databases:
  - name: moniny-db
    databaseName: moniny
    plan: free

services:
  - type: web
    name: moniny
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run db:seed && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: moniny-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: 22.11.0
